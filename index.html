<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Siberia League</title>
    <script src="https://telegram.org"></script>
    <style>
        :root {
            --bg-color: #121826; --card-bg: #1e2640; --text-color: #ffffff;
            --text-muted: #94a3b8; --accent-color: #3b82f6; --border-color: #2d3748;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, Arial, sans-serif;
            background-color: var(--bg-color); color: var(--text-color);
            margin: 0; padding: 16px; padding-bottom: 80px;
        }
        h2 { font-size: 18px; text-align: center; margin-bottom: 20px; font-weight: 700; }
        .league-section { margin-bottom: 24px; }
        .league-title {
            font-size: 12px; color: var(--text-muted); text-transform: uppercase;
            font-weight: 700; margin-bottom: 10px; border-bottom: 1px solid var(--border-color); padding-bottom: 4px;
        }
        .match-card { background-color: var(--card-bg); border-radius: 12px; padding: 14px; margin-bottom: 10px; }
        .match-row { display: flex; align-items: center; justify-content: space-between; }
        .team { width: 35%; text-align: center; font-size: 13px; font-weight: 600; }
        .score-selector { width: 30%; display: flex; flex-direction: column; align-items: center; }
        .time { font-size: 12px; color: var(--accent-color); font-weight: 700; margin-bottom: 4px; }
        .controls { display: flex; align-items: center; gap: 8px; }
        .btn-counter {
            background: #2d3748; border: none; color: white; width: 26px; height: 26px;
            border-radius: 50%; font-size: 14px; cursor: pointer;
        }
        .score-val { font-size: 16px; font-weight: 700; min-width: 14px; text-align: center; }
        .btn-predict {
            width: 100%; background-color: var(--accent-color); border: none; color: white;
            padding: 9px; border-radius: 8px; font-size: 13px; font-weight: 600; margin-top: 10px; cursor: pointer;
        }
        .nav-bar {
            position: fixed; bottom: 0; left: 0; right: 0; height: 60px;
            background-color: var(--card-bg); display: flex; justify-content: space-around; align-items: center;
            border-top: 1px solid var(--border-color);
        }
        .nav-item { color: var(--text-muted); font-size: 11px; cursor: pointer; text-align: center; }
        .nav-item.active { color: var(--accent-color); font-weight: 700; }
        .no-data { text-align: center; color: var(--text-muted); margin-top: 40px; font-size: 13px; padding: 0 20px; }
    </style>
</head>
<body>

    <h2 id="page-title">МАТЧ-ЦЕНТР</h2>
    <div id="content-area">
        <div class="no-data">Подключение к футбольному серверу...</div>
    </div>

    <div class="nav-bar">
        <div id="tab-m" class="nav-item active" onclick="loadMatches()">📅 Матчи</div>
        <div id="tab-t" class="nav-item" onclick="showTables()">📊 Таблицы</div>
    </div>

        <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        let userScores = {};

        function changeScore(matchId, team, val) {
            if (!userScores[matchId]) userScores[matchId] = { home: 0, away: 0 };
            if (team === 'home') {
                userScores[matchId].home = Math.max(0, userScores[matchId].home + val);
                document.getElementById(`h-${matchId}`).innerText = userScores[matchId].home;
            } else {
                userScores[matchId].away = Math.max(0, userScores[matchId].away + val);
                document.getElementById(`a-${matchId}`).innerText = userScores[matchId].away;
            }
        }

        function sendPrediction(matchId) {
            const home = userScores[matchId] ? userScores[matchId].home : 0;
            const away = userScores[matchId] ? userScores[matchId].away : 0;
            
            tg.sendData(JSON.stringify({
                action: "predict",
                match_id: matchId,
                score: `${home}:${away}`
            }));
            tg.close();
        }

        async function loadMatches() {
            document.getElementById('tab-t').classList.remove('active');
            document.getElementById('tab-m').classList.add('active');
            const area = document.getElementById('content-area');
            area.innerHTML = '<div class="no-data">Загрузка расписания РПЛ и Европы...</div>';

            try {
                // Подключаемся к независимому открытому футбольному API-зеркалу со свободным доступом
                const response = await fetch('https://allorigins.win' + encodeURIComponent('https://fixturedownload.com'));
                const wrapper = await response.json();
                const data = JSON.parse(wrapper.contents);
                
                let html = '<div class="league-section"><div class="league-title">Российская Премьер-Лига</div>';
                let hasMatches = false;

                if (data && data.length > 0) {
                    // Вытаскиваем первые 8 ближайших матчей турнира
                    const upcoming = data.filter(m => !m.HomeTeamScore && !m.AwayTeamScore).slice(0, 8);
                    
                    upcoming.forEach(m => {
                        hasMatches = true;
                        // Переводим время в локальный формат
                        const matchDate = new Date(m.Date);
                        const dayStr = matchDate.toLocaleDateString('ru-RU', { weekday: 'short', day: 'numeric', month: 'short' });
                        const timeStr = matchDate.toLocaleTimeString('ru-RU', { hour: '2-digit', minute: '2-digit' });
                        
                        html += `
                            <div class="match-card">
                                <div class="match-row">
                                    <div class="team">${m.HomeTeam}</div>
                                    <div class="score-selector">
                                        <div class="time" style="font-size:10px; color:var(--text-muted);">${dayStr}</div>
                                        <div class="time">${timeStr}</div>
                                        <div class="controls">
                                            <button class="btn-counter" onclick="changeScore(${m.MatchNumber}, 'home', -1)">-</button>
                                            <span class="score-val" id="h-${m.MatchNumber}">0</span>
                                            <button class="btn-counter" onclick="changeScore(${m.MatchNumber}, 'home', 1)">+</button>
                                        </div>
                                        <div style="margin: 2px 0; color: var(--text-muted); font-size:12px;">:</div>
                                        <div class="controls">
                                            <button class="btn-counter" onclick="changeScore(${m.MatchNumber}, 'away', -1)">-</button>
                                            <span class="score-val" id="a-${m.MatchNumber}">0</span>
                                            <button class="btn-counter" onclick="changeScore(${m.MatchNumber}, 'away', 1)">+</button>
                                        </div>
                                    </div>
                                    <div class="team">${m.AwayTeam}</div>
                                </div>
                                <button class="btn-predict" onclick="sendPrediction(${m.MatchNumber})">ПОДТВЕРДИТЬ ПРОГНОЗ</button>
                            </div>`;
                    });
                }

                html += '</div>';

                if (!hasMatches) {
                    area.innerHTML = '<div class="no-data">Линия РПЛ обновляется спортивным сервером. Попробуйте зайти через пару минут.</div>';
                } else {
                    area.innerHTML = html;
                }

            } catch (error) {
                console.error(error);
                area.innerHTML = '<div class="no-data">⚠️ Ошибка обновления спортивной ленты. Зайдите позже.</div>';
            }
        }

        function showTables() {
            document.getElementById('tab-m').classList.remove('active');
            document.getElementById('tab-t').classList.add('active');
            document.getElementById('content-area').innerHTML = 
                '<div class="no-data">Рейтинги участников активируются после подсчета первых результатов прогнозов.</div>';
        }

        window.onload = loadMatches;
    </script>
</body>
</html>
