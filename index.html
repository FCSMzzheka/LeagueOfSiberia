<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Football Predictor</title>
    <!-- Подключаем официальный скрипт Telegram WebApp -->
    <script src="https://telegram.org"></script>
    <style>
        :root {
            --bg-color: #121826;
            --card-bg: #1e2640;
            --text-color: #ffffff;
            --text-muted: #94a3b8;
            --accent-color: #3b82f6;
            --success-color: #10b981;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 16px;
            padding-bottom: 80px;
        }
        h2 { font-size: 20px; font-weight: 700; margin-bottom: 20px; text-align: center; }
        .match-card {
            background-color: var(--card-bg);
            border-radius: 12px;
            padding: 16px;
            margin-bottom: 12px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }
        .league-title {
            font-size: 12px; color: var(--text-muted); text-transform: uppercase;
            letter-spacing: 0.05em; margin-bottom: 8px; border-bottom: 1px solid #2d3748; padding-bottom: 4px;
        }
        .match-row { display: flex; align-items: center; justify-content: space-between; }
        .team { width: 35%; display: flex; flex-direction: column; align-items: center; text-align: center; }
        .team-name { font-size: 14px; font-weight: 600; margin-top: 8px; }
        .score-selector { width: 30%; display: flex; flex-direction: column; align-items: center; }
        .time { font-size: 12px; color: var(--accent-color); font-weight: bold; margin-bottom: 6px; }
        .controls { display: flex; align-items: center; gap: 8px; }
        .btn-counter {
            background: #2d3748; border: none; color: white; width: 28px; height: 28px;
            border-radius: 50%; font-size: 16px; cursor: pointer; display: flex; align-items: center; justify-content: center;
        }
        .score-val { font-size: 20px; font-weight: 700; min-width: 16px; text-align: center; }
        .btn-predict {
            width: 100%; background-color: var(--accent-color); border: none; color: white;
            padding: 10px; border-radius: 8px; font-weight: 600; margin-top: 12px; cursor: pointer;
        }
        /* Стили вкладок навигации */
        .nav-bar {
            position: fixed; bottom: 0; left: 0; right: 0; height: 60px;
            background-color: var(--card-bg); display: flex; justify-content: space-around;
            align-items: center; border-top: 1px solid #2d3748;
        }
        .nav-item { color: var(--text-muted); font-size: 12px; cursor: pointer; text-align: center; }
        .nav-item.active { color: var(--accent-color); font-weight: bold; }
    </style>
</head>
<body>

    <h2 id="page-title">МАТЧ-ЦЕНТР</h2>
    <div id="content-area">
        <!-- Пример карточки матча (В будущем будет загружаться динамически из Python) -->
        <div class="match-card">
            <div class="league-title">Российская Премьер-Лига</div>
            <div class="match-row">
                <div class="team">
                    <div class="team-name">Зенит</div>
                </div>
                <div class="score-selector">
                    <div class="time">19:30</div>
                    <div class="controls">
                        <button class="btn-counter" onclick="changeScore('home', -1)">-</button>
                        <span class="score-val" id="score-home">0</span>
                        <button class="btn-counter" onclick="changeScore('home', 1)">+</button>
                    </div>
                    <div style="margin: 4px 0; color: var(--text-muted)">:</div>
                    <div class="controls">
                        <button class="btn-counter" onclick="changeScore('away', -1)">-</button>
                        <span class="score-val" id="score-away">0</span>
                        <button class="btn-counter" onclick="changeScore('away', 1)">+</button>
                    </div>
                </div>
                <div class="team">
                    <div class="team-name">Спартак</div>
                </div>
            </div>
            <button class="btn-predict" onclick="sendPrediction(100500)">ПОДТВЕРДИТЬ ПРОГНОЗ</button>
        </div>
    </div>

    <!-- Нижнее меню навигации -->
    <div class="nav-bar">
        <div class="nav-item active" onclick="switchTab('matches')">📅 Матчи</div>
        <div class="nav-item" onclick="switchTab('tables')">📊 Таблицы</div>
        <div class="nav-item" onclick="switchTab('leagues')">⚙️ Лиги</div>
    </div>

    <script>
        // Инициализация Telegram WebApp API
        const tg = window.Telegram.WebApp;
        tg.expand(); // Расширяем приложение на весь экран телефона

        let homeScore = 0;
        let awayScore = 0;

        function changeScore(team, val) {
            if (team === 'home') {
                homeScore = Math.max(0, homeScore + val);
                document.getElementById('score-home').innerText = homeScore;
            } else {
                awayScore = Math.max(0, awayScore + val);
                document.getElementById('score-away').innerText = awayScore;
            }
        }

        // Функция отправки прогноза обратно в Python-бота
        function sendPrediction(matchId) {
            const resultData = {
                action: "predict",
                match_id: matchId,
                score: `${homeScore}:${awayScore}`
            };
            // Передаем строку с данными в бота и закрываем WebApp
            tg.sendData(JSON.stringify(resultData));
            tg.close();
        }

        function switchTab(tab) {
            // Логика переключения экранов
            document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
            event.currentTarget.classList.add('active');
            if (tab === 'matches') document.getElementById('page-title').innerText = "МАТЧ-ЦЕНТР";
            if (tab === 'tables') document.getElementById('page-title').innerText = "ТАБЛИЦЫ ЛИДЕРОВ";
            if (tab === 'leagues') document.getElementById('page-title').innerText = "МОИ НАСТРОЙКИ";
        }
    </script>
</body>
</html>
