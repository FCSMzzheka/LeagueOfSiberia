<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Siberia League</title>
    <script src="https://telegram.org"></script>
    <style>
        :root {
            --bg-color: #121826;
            --card-bg: #1e2640;
            --text-color: #ffffff;
            --text-muted: #94a3b8;
            --accent-color: #3b82f6;
            --border-color: #2d3748;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, Arial, sans-serif;
            background-color: var(--bg-color); color: var(--text-color);
            margin: 0; padding: 16px; padding-bottom: 80px;
        }
        h2 { font-size: 18px; text-align: center; margin-bottom: 20px; font-weight: 700; letter-spacing: 0.03em; }
        .league-section { margin-bottom: 24px; }
        .league-title {
            font-size: 12px; color: var(--text-muted); text-transform: uppercase;
            font-weight: 700; letter-spacing: 0.05em; margin-bottom: 10px;
            border-bottom: 1px solid var(--border-color); padding-bottom: 4px;
        }
        .match-card { background-color: var(--card-bg); border-radius: 12px; padding: 14px; margin-bottom: 10px; }
        .match-row { display: flex; align-items: center; justify-content: space-between; }
        .team { width: 35%; text-align: center; font-size: 13px; font-weight: 600; }
        .score-selector { width: 30%; display: flex; flex-direction: column; align-items: center; }
        .time { font-size: 12px; color: var(--accent-color); font-weight: 700; margin-bottom: 4px; }
        .controls { display: flex; align-items: center; gap: 8px; }
        .btn-counter {
            background: #2d3748; border: none; color: white; width: 26px; height: 26px;
            border-radius: 50%; font-size: 14px; cursor: pointer; font-weight: bold;
        }
        .score-val { font-size: 16px; font-weight: 700; min-width: 14px; text-align: center; }
        .btn-predict {
            width: 100%; background-color: var(--accent-color); border: none; color: white;
            padding: 9px; border-radius: 8px; font-size: 13px; font-weight: 600; margin-top: 10px; cursor: pointer;
        }
        .leader-row {
            display: flex; justify-content: space-between; padding: 10px 14px;
            background-color: var(--card-bg); margin-bottom: 6px; border-radius: 8px; font-size: 13px;
        }
        .nav-bar {
            position: fixed; bottom: 0; left: 0; right: 0; height: 60px;
            background-color: var(--card-bg); display: flex; justify-content: space-around; align-items: center;
            border-top: 1px solid var(--border-color);
        }
        .nav-item { color: var(--text-muted); font-size: 11px; cursor: pointer; text-align: center; font-weight: 500; }
        .nav-item.active { color: var(--accent-color); font-weight: 700; }
        .no-data { text-align: center; color: var(--text-muted); margin-top: 40px; font-size: 13px; }
    </style>
</head>
<body>

    <h2 id="page-title">МАТЧ-ЦЕНТР</h2>
    <div id="content-area"></div>

    <div class="nav-bar">
        <div id="tab-m" class="nav-item active" onclick="renderMatches()">📅 Матчи</div>
        <div id="tab-t" class="nav-item" onclick="renderLeaderboards()">📊 Таблицы</div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        // Извлекаем переданные бэкендом данные из адресной строки сайта
        const urlParams = new URLSearchParams(window.location.search);
        let serverData = { matches: [], leaderboards: {}, leagues: {} };
        
        try {
            const rawData = urlParams.get('data');
            if (rawData) serverData = JSON.parse(rawData);
        } catch (e) { console.error("Ошибка парсинга данных", e); }

        let userScores = {};

        function changeScore(matchId, team, val) {
            if (!userScores[matchId]) userScores[matchId] = { home: 0, away: 0 };
            if (team === 'home') {
                userScores[matchId].home = Math.max(0, userScores[matchId].home + val);
                document.getElementById(`h-${matchId}`).innerText = userScores[matchId].home;
            } else {
                userScores[matchId].away = Math.max(0, userScores[matchId].away + val);
                document.getElementById(`a-${matchId}`).innerText = userScores[matchId].away;
            }
        }

        function sendPrediction(matchId) {
            const home = userScores[matchId] ? userScores[matchId].home : 0;
            const away = userScores[matchId] ? userScores[matchId].away : 0;
            tg.sendData(JSON.stringify({ action: "predict", match_id: matchId, score: `${home}:${away}` }));
            tg.close();
        }

        function renderMatches() {
            document.getElementById('page-title').innerText = "МАТЧ-ЦЕНТР";
            document.getElementById('tab-t').classList.remove('active');
            document.getElementById('tab-m').classList.add('active');
            
            const area = document.getElementById('content-area');
            if (serverData.matches.length === 0) {
                area.innerHTML = '<div class="no-data">Нет доступных матчей на ближайшие дни.</div>';
                return;
            }

            // Группируем игры по чемпионатам
            const groups = {};
            serverData.matches.forEach(m => {
                if (!groups[m.league]) groups[m.league] = [];
                groups[m.league].push(m);
            });

            let html = '';
            // Выводим РПЛ на первом месте, если она есть
            const sortedLeagues = Object.keys(groups).sort((a, b) => a.includes("Российская") ? -1 : b.includes("Российская") ? 1 : 0);
            
            sortedLeagues.forEach(league => {
                html += `<div class="league-section"><div class="league-title">${league}</div>`;
                groups[league].forEach(m => {
                    const localTime = new Date(m.date).toLocaleTimeString('ru-RU', { hour: '2-digit', minute: '2-digit' });
                    html += `
                        <div class="match-card">
                            <div class="match-row">
                                <div class="team">${m.home}</div>
                                <div class="score-selector">
                                    <div class="time">${localTime}</div>
                                    <div class="controls">
                                        <button class="btn-counter" onclick="changeScore(${m.id}, 'home', -1)">-</button>
                                        <span class="score-val" id="h-${m.id}">0</span>
                                        <button class="btn-counter" onclick="changeScore(${m.id}, 'home', 1)">+</button>
                                    </div>
                                    <div style="margin: 2px 0; color: var(--text-muted); font-size:12px;">:</div>
                                    <div class="controls">
                                        <button class="btn-counter" onclick="changeScore(${m.id}, 'away', -1)">-</button>
                                        <span class="score-val" id="a-${m.id}">0</span>
                                        <button class="btn-counter" onclick="changeScore(${m.id}, 'away', 1)">+</button>
                                    </div>
                                </div>
                                <div class="team">${m.away}</div>
                            </div>
                            <button class="btn-predict" onclick="sendPrediction(${m.id})">ПОДТВЕРДИТЬ ПРОГНОЗ</button>
                        </div>`;
                });
                html += '</div>';
            });
            area.innerHTML = html;
        }

        function renderLeaderboards() {
            document.getElementById('page-title').innerText = "ТАБЛИЦЫ ЛИДЕРОВ";
            document.getElementById('tab-m').classList.remove('active');
            document.getElementById('tab-t').classList.add('active');
            
            const area = document.getElementById('content-area');
            let html = '';
            
            Object.keys(serverData.leaderboards).forEach(lId => {
                const lName = serverData.leagues[lId] || "Чемпионат";
                const users = serverData.leaderboards[lId];
                
                html += `<div class="league-section"><div class="league-title">${lName}</div>`;
                if (users.length === 0) {
                    html += '<div class="no-data" style="margin-top:10px; margin-bottom:20px;">В этой лиге пока нет очков.</div>';
                } else {
                    users.forEach((u, index) => {
                        html += `
                            <div class="leader-row">
                                <span><b>${index + 1}.</b> @${u.username}</span>
                                <span style="color: var(--accent-color); font-weight:700;">${u.points} pts</span>
                            </div>`;
                    });
                }
                html += '</div>';
            });
            area.innerHTML = html;
        }

        // Стартовый запуск отрисовки матчей
        renderMatches();
    </script>
</body>
</html>
